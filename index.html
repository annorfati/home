<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #282020;
  color: #A28B8B;
  font-family: Commit Mono, monospace;
  text-align: center;
  margin: 0;
  padding: 15px;
}

h1 {
  font-weight: 100;
  letter-spacing: 6px;
  font-size: 22px;

  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {

  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }

}

#homepage-content {

  opacity: 1;
}

.subtitle {

  opacity: 0;

  font-size: 13px;

  letter-spacing: 2px;

  color: #CBBEBE;

  animation: fadeIn 2s forwards;

  animation-delay: 1s;

  transition: opacity 1.5s ease;
}

.menu {

  margin-top: 150px;
}

.menu a {

  display: block;

  margin: 25px 0;

  color: #CBBEBE;

  text-decoration: none;

  letter-spacing: 4px;

  font-size: 16px;

  transition: opacity 0.3s ease;
}

.menu a:hover {

  opacity: 0.6;
}


footer {

  margin-top: 200px;

  font-size: 11px;

  opacity: 0.5;

  letter-spacing: 2px;
}
  
</style>

</head>

<body>

<div id="homepage-content">

  <h1>annorfati</h1>

  <p class="subtitle" id="subtitle">
    .
  </p>

  <div class="menu">

    <a href="archive.html">archive</a>

    <a href="notes.html">notes</a>

  </div>

  <footer>
    ongoing website, 2026-
  </footer>

</div>

<script>


const subtitles = [

  ".",

  "~",

  "v",

  "Y",

  "✿"

];

let subtitleIndex = 0;

setInterval(function() {

  const subtitle =
    document.getElementById("subtitle");

  subtitle.style.opacity = "0";

  setTimeout(function() {

    subtitleIndex =
      (subtitleIndex + 1) % subtitles.length;

    subtitle.innerHTML =
      subtitles[subtitleIndex];

    subtitle.style.opacity = "1";

  }, 1000);

}, 1000);

</script>

</body>
</html>
