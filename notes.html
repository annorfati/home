<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #282020;
  color: #A28B8B;
  font-family: Commit Mono, monospace;
  text-align: center;
  margin: 0;
  padding: 15px;
}

h1 {
  font-weight: 100;
  letter-spacing: 6px;
  font-size: 22px;

  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {

  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }

}

.subtitle {

  opacity: 0;

  font-size: 13px;

  letter-spacing: 2px;

  color: #CBBEBE;

  animation: fadeIn 2s forwards;

  animation-delay: 1s;
}

.content {

  max-width: 700px;

  margin: 100px auto;

  text-align: left;

  line-height: 1.8;

  opacity: 0;

  animation: fadeIn 2s forwards;

  animation-delay: 2s;
}

.home-link {

  display: inline-block;

  margin-top: 50px;

  color: #CBBEBE;

  text-decoration: none;

  letter-spacing: 3px;

  transition: opacity 0.3s ease;
}

.home-link:hover {

  opacity: 0.6;
}

footer {

  margin-top: 100px;

  font-size: 11px;

  opacity: 0.5;

  letter-spacing: 2px;
}

</style>

</head>

<body>

<h1>marginalia</h1>

<p class="subtitle">
  ...
</p>

<div class="content">

  <p>
    under construction
  </p>

</div>

<a class="home-link" href="index.html">
  home
</a>

<footer>
  ongoing , 2025–
</footer>

</body>
</html>
